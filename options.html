<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 16px;
      min-width: 300px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    #status {

      color: #1a7f37;
      font-size: 13px;
    }

<body>
  <label for="prefix">URL Prefix</label>
  <input type="text" id="prefix" placeholder="https://example.com/?url=">
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
